# ------------------------------------------------------------
# NookMesh Subscriptions Service
# Periodic subscription and expiration processing
# ------------------------------------------------------------

services:
  nookmesh-subscriptions:

    image: nookmesh-subscriptions:latest

    container_name: nookmesh-subscriptions

    build:
      context: .

    restart: unless-stopped

    environment:
      - TZ=Europe/Madrid

    volumes:
      - ../:/nookmesh
      - /var/run/docker.sock:/var/run/docker.sock